<!DOCTYPE html>
<html>
<head>
    <title>Supabase Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Supabase Connection Diagnostics</h1>
    
    <div id="results"></div>
    
    <button onclick="runTests()">Run Tests</button>
    
    <script>
        const SUPABASE_URL = 'https://hnevrdlcqhmsfubakljg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZXZyZGxjcWhtc2Z1YmFrbGpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAwNDIzMDEsImV4cCI6MjA3NTYxODMwMX0.e4OjzNc4A6d6petuDQFW-iD6JPVqwmy5Y_KWvgXabBA';
        
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            resultsDiv.appendChild(div);
        }
        
        async function runTests() {
            resultsDiv.innerHTML = '';
            addResult('<h3>Starting tests...</h3>', 'info');
            
            // Test 1: Basic connectivity
            addResult('<h4>Test 1: Can we reach Supabase at all?</h4>', 'info');
            try {
                const response = await fetch(SUPABASE_URL, { 
                    method: 'HEAD',
                    signal: AbortSignal.timeout(10000)
                });
                addResult(`✅ Supabase domain is reachable (HTTP ${response.status})`, 'success');
            } catch (error) {
                addResult(`❌ Cannot reach Supabase domain:<br><pre>${error.message}</pre>`, 'error');
                addResult('⚠️ This suggests network issues, firewall blocking, or Supabase downtime', 'error');
            }
            
            // Test 2: REST API endpoint
            addResult('<h4>Test 2: Is REST API responding?</h4>', 'info');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
                    headers: {
                        'apikey': SUPABASE_KEY || 'test',
                    },
                    signal: AbortSignal.timeout(10000)
                });
                addResult(`✅ REST API responded (HTTP ${response.status})`, 'success');
            } catch (error) {
                addResult(`❌ REST API timeout or error:<br><pre>${error.message}</pre>`, 'error');
            }
            
            // Test 3: Query expert_profiles
            addResult('<h4>Test 3: Can we query expert_profiles?</h4>', 'info');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/expert_profiles?select=id&limit=1`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    },
                    signal: AbortSignal.timeout(10000)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Query succeeded (HTTP ${response.status})<br><pre>${JSON.stringify(data, null, 2)}</pre>`, 'success');
                } else {
                    addResult(`⚠️ Query failed (HTTP ${response.status})<br><pre>${JSON.stringify(data, null, 2)}</pre>`, 'error');
                }
            } catch (error) {
                addResult(`❌ Query timeout or error:<br><pre>${error.message}</pre>`, 'error');
            }
            
            // Test 4: Check CORS
            addResult('<h4>Test 4: CORS Check</h4>', 'info');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/expert_profiles?select=id&limit=1`, {
                    method: 'OPTIONS',
                    signal: AbortSignal.timeout(5000)
                });
                addResult(`✅ CORS preflight succeeded (HTTP ${response.status})`, 'success');
            } catch (error) {
                addResult(`⚠️ CORS preflight issue:<br><pre>${error.message}</pre>`, 'info');
            }
            
            addResult('<h3>Tests Complete</h3>', 'info');
        }
        
        // Auto-run tests on load
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
