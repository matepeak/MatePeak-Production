name: Payout Reconciliation

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reconcile-mentor-payouts
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          PAYOUT_RECONCILE_SECRET: ${{ secrets.PAYOUT_RECONCILE_SECRET }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_PROJECT_REF GitHub secret"
            exit 1
          fi

          if [ -z "$PAYOUT_RECONCILE_SECRET" ]; then
            echo "Missing PAYOUT_RECONCILE_SECRET GitHub secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/reconcile-mentor-payouts" \
            -H "Content-Type: application/json" \
            -H "x-reconcile-secret: ${PAYOUT_RECONCILE_SECRET}" \
            -d '{"limit":50,"older_than_minutes":2}'
